<!DOCTYPE html>
<html>
<head>
  <title>CyberShield</title>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- HERO -->
<div class="hero">

  <!-- Center Logo -->
  <div class="top-bar">
    <h1><i class="fa-solid fa-shield-halved"></i> CyberShield</h1>
    <p>Advanced Phishing Detection System</p>
  </div>

  <!-- SLIDE 1 -->
  <div class="slide active" style="background-image: url('{{ url_for('static', filename='HD-wallpaper-hacker-hood-code-programming.jpg') }}');">
    <div class="overlay">
      <div class="feature-box">
        <i class="fa-solid fa-bolt"></i>
        <h2>Lightning Fast</h2>
        <p>Instant scan results</p>
      </div>
    </div>
  </div>

  <!-- SLIDE 2 -->
  <div class="slide" style="background-image: url('{{ url_for('static', filename='anarchy-anonymous-binary-code-wallpaper-preview.jpg') }}');">
    <div class="overlay">
      <div class="feature-box">
        <i class="fa-solid fa-brain"></i>
        <h2>AI Powered</h2>
        <p>97.60% Accuracy</p>
      </div>
    </div>
  </div>

  <!-- SLIDE 3 -->
  <div class="slide" style="background-image: url('{{ url_for('static', filename='thumb-1920-1108171.png') }}');">
    <div class="overlay">
      <div class="feature-box">
        <i class="fa-solid fa-lock"></i>
        <h2>Secure</h2>
        <p>Your data is safe</p>
      </div>
    </div>
  </div>

  <!-- SLIDE 4 -->
  <div class="slide" style="background-image: url('{{ url_for('static', filename='HD-Hacker-Desktop-Wallpaper.jpg') }}');">
    <div class="overlay">
      <div class="feature-box">
        <i class="fa-solid fa-chart-line"></i>
        <h2>Analytics</h2>
        <p>Track all scans</p>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta">
    <a href="/scanner">
      <i class="fa-solid fa-play"></i> Start Scanning
    </a>
  </div>

</div>

<!-- SCRIPT -->
<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i){
  slides[index].classList.remove("active");  // remove only current
  index = (i + slides.length) % slides.length;
  slides[index].classList.add("active");     // add next
}

setInterval(() => {
  showSlide(index + 1);
}, 4000);
</script>

</body>
</html>

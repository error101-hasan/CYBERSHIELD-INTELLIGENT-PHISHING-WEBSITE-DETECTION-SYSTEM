services:
  - type: web
    name: cybershield-realtime
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        fromDatabase:
          name: cybershield-db
          property: connectionString

databases:
  - name: cybershield-db
    plan: free
    region: oregon
    postgresMajorVersion: "17"
